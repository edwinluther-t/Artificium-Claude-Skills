<!DOCTYPE html>
<!--
  ARCHETYPE: layered-stack (architecture)
  WHEN TO USE: show a system as horizontal layers, top (user/UI) to bottom
  (infra/data). Each layer = a band with label + components.
  RENDER: chrome --headless --force-device-scale-factor=2 --window-size=1080,1350 ...
-->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<style>
  :root{--bg:#0a0a0b;--panel:#141416;--line:#26262b;--ink:#f4f4f5;--muted:#a1a1aa;--accent:#f5a623;--w:1080px;--h:1350px;}
  *{margin:0;box-sizing:border-box}
  html,body{width:var(--w);height:var(--h)}
  body{background:var(--bg);color:var(--ink);font-family:"Inter",sans-serif;overflow:hidden;
    background-image:radial-gradient(circle at 1px 1px,#ffffff0a 1px,transparent 0);background-size:32px 32px;}
  .wrap{height:100%;display:flex;flex-direction:column;padding:80px 72px}
  .eyebrow{font-family:"JetBrains Mono",monospace;color:var(--accent);letter-spacing:.18em;text-transform:uppercase;font-size:20px}
  h1{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:60px;line-height:1.04;margin-top:14px;letter-spacing:-.02em;max-width:16ch}
  .stack{flex:1;display:flex;flex-direction:column;gap:20px;margin:52px 0}
  .layer{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:18px;
    padding:0 34px;display:flex;align-items:center;gap:28px;position:relative;overflow:hidden}
  .layer::before{content:"";position:absolute;left:0;top:0;bottom:0;width:6px;background:var(--accent);opacity:.0}
  .layer:nth-child(odd)::before{opacity:.9}
  .layer .name{min-width:230px}
  .layer .name .t{font-family:"Space Grotesk",sans-serif;font-size:30px;font-weight:700}
  .layer .name .s{font-family:"JetBrains Mono",monospace;font-size:16px;color:var(--accent);letter-spacing:.1em;text-transform:uppercase}
  .chips{display:flex;gap:14px;flex-wrap:wrap}
  .chip{display:inline-flex;align-items:center;gap:10px;background:#1d1d22;border:1px solid var(--line);
    border-radius:999px;padding:12px 20px;font-size:20px;color:var(--muted)}
  .chip .iconify{font-size:24px;color:var(--accent)}
  .foot{display:flex;justify-content:space-between;align-items:center;color:var(--muted);font-size:18px;border-top:1px solid var(--line);padding-top:24px}
  .foot b{color:var(--ink)}
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">// system architecture</div>
    <h1>The stack, top to bottom</h1>
    <div class="stack">
      <div class="layer"><div class="name"><div class="t">Interface</div><div class="s">layer 01</div></div>
        <div class="chips"><span class="chip"><span class="iconify" data-icon="lucide:layout"></span>Web</span><span class="chip"><span class="iconify" data-icon="lucide:smartphone"></span>Mobile</span></div></div>
      <div class="layer"><div class="name"><div class="t">Logic</div><div class="s">layer 02</div></div>
        <div class="chips"><span class="chip"><span class="iconify" data-icon="lucide:cpu"></span>API</span><span class="chip"><span class="iconify" data-icon="lucide:workflow"></span>Orchestration</span></div></div>
      <div class="layer"><div class="name"><div class="t">Model</div><div class="s">layer 03</div></div>
        <div class="chips"><span class="chip"><span class="iconify" data-icon="lucide:bot"></span>LLM</span><span class="chip"><span class="iconify" data-icon="lucide:wrench"></span>Tools</span></div></div>
      <div class="layer"><div class="name"><div class="t">Data</div><div class="s">layer 04</div></div>
        <div class="chips"><span class="chip"><span class="iconify" data-icon="lucide:database"></span>Store</span><span class="chip"><span class="iconify" data-icon="lucide:search"></span>Index</span></div></div>
    </div>
    <div class="foot"><span>The Artificium</span><span><b>@edwinluther-t</b></span></div>
  </div>
</body>
</html>
