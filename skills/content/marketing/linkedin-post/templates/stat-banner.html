<!DOCTYPE html>
<!--
  ARCHETYPE: stat-banner
  WHEN TO USE: one or a few big numbers are the whole point. Hero stat dominates;
  supporting context small. Best as landscape 1200x627 too.
  RENDER: chrome --headless --force-device-scale-factor=2 --window-size=1080,1350 ...
-->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<style>
  :root{--bg:#0a0a0b;--panel:#141416;--line:#26262b;--ink:#f4f4f5;--muted:#a1a1aa;--accent:#f5a623;--w:1080px;--h:1350px;}
  *{margin:0;box-sizing:border-box}
  html,body{width:var(--w);height:var(--h)}
  body{background:var(--bg);color:var(--ink);font-family:"Inter",sans-serif;overflow:hidden;
    background-image:radial-gradient(circle at 1px 1px,#ffffff0a 1px,transparent 0);background-size:32px 32px;
    -webkit-mask-image:radial-gradient(ellipse 80% 70% at 50% 45%,#000 45%,transparent 100%);}
  .wrap{height:100%;display:flex;flex-direction:column;padding:80px 72px}
  .eyebrow{font-family:"JetBrains Mono",monospace;color:var(--accent);letter-spacing:.18em;text-transform:uppercase;font-size:20px}
  .hero{flex:1;display:flex;flex-direction:column;justify-content:center}
  .big{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:300px;line-height:.9;
    letter-spacing:-.04em;color:var(--accent);text-shadow:0 30px 80px #f5a62333}
  .big small{font-size:120px}
  .claim{font-family:"Space Grotesk",sans-serif;font-size:54px;line-height:1.06;margin-top:10px;max-width:18ch}
  .sub{color:var(--muted);font-size:24px;margin-top:24px;max-width:30ch;line-height:1.45}
  .row{display:flex;gap:48px;margin-top:48px}
  .mini .n{font-family:"Space Grotesk",sans-serif;font-size:48px;font-weight:700}
  .mini .l{color:var(--muted);font-size:18px;font-family:"JetBrains Mono",monospace;letter-spacing:.08em;text-transform:uppercase}
  .foot{display:flex;justify-content:space-between;align-items:center;color:var(--muted);font-size:18px;border-top:1px solid var(--line);padding-top:24px}
  .foot b{color:var(--ink)}
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">// by the numbers</div>
    <div class="hero">
      <div class="big">229<small>+</small></div>
      <div class="claim">The single number that makes the point.</div>
      <div class="sub">One line of context so the stat doesn't float. Source it if you can.</div>
      <div class="row">
        <div class="mini"><div class="n">4</div><div class="l">phases</div></div>
        <div class="mini"><div class="n">7</div><div class="l">categories</div></div>
        <div class="mini"><div class="n">MIT</div><div class="l">license</div></div>
      </div>
    </div>
    <div class="foot"><span>The Artificium</span><span><b>@edwinluther-t</b></span></div>
  </div>
</body>
</html>
