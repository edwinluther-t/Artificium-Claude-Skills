<!DOCTYPE html>
<!--
  ARCHETYPE: before-after
  WHEN TO USE: contrast an old/painful way against a new/better way. Two panels,
  left = before (desaturated/red), right = after (accent/green).
  RENDER: chrome --headless --force-device-scale-factor=2 --window-size=1080,1350 ...
-->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<style>
  :root{
    --bg:#0a0a0b; --panel:#141416; --line:#26262b;
    --ink:#f4f4f5; --muted:#a1a1aa; --accent:#f5a623;
    --bad:#ef4444; --good:#22c55e;
    --w:1080px; --h:1350px;
  }
  *{margin:0;box-sizing:border-box}
  html,body{width:var(--w);height:var(--h)}
  body{background:var(--bg);color:var(--ink);font-family:"Inter",sans-serif;overflow:hidden;
    background-image:radial-gradient(circle at 1px 1px,#ffffff0a 1px,transparent 0);background-size:32px 32px;
    -webkit-mask-image:radial-gradient(ellipse 90% 80% at 50% 45%,#000 55%,transparent 100%);}
  .wrap{height:100%;display:flex;flex-direction:column;padding:80px 72px}
  .eyebrow{font-family:"JetBrains Mono",monospace;color:var(--accent);letter-spacing:.18em;text-transform:uppercase;font-size:20px}
  h1{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:60px;line-height:1.04;margin-top:14px;letter-spacing:-.02em;max-width:16ch}
  .cols{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:28px;margin:56px 0}
  .col{background:var(--panel);border:1px solid var(--line);border-radius:22px;padding:38px 34px;display:flex;flex-direction:column}
  .tag{font-family:"JetBrains Mono",monospace;font-size:18px;letter-spacing:.12em;text-transform:uppercase;display:inline-flex;align-items:center;gap:10px}
  .before .tag{color:var(--bad)} .after .tag{color:var(--good)}
  .after{border-color:#f5a62355;box-shadow:0 0 0 1px #f5a62333,0 24px 60px #0006}
  .col h2{font-family:"Space Grotesk",sans-serif;font-size:34px;margin:18px 0 24px}
  .col li{list-style:none;display:flex;gap:14px;align-items:flex-start;font-size:22px;line-height:1.4;color:var(--muted);margin-bottom:18px}
  .col li .x{font-size:26px;flex:none}
  .before li .x{color:var(--bad)} .after li .x{color:var(--good)}
  .foot{display:flex;justify-content:space-between;align-items:center;color:var(--muted);font-size:18px;border-top:1px solid var(--line);padding-top:24px}
  .foot b{color:var(--ink)}
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">// before / after</div>
    <h1>The old way vs. the way that works</h1>
    <div class="cols">
      <div class="col before">
        <span class="tag"><span class="iconify" data-icon="lucide:x-circle"></span>Before</span>
        <h2>The painful path</h2>
        <ul>
          <li><span class="x iconify" data-icon="lucide:minus"></span>Friction point one.</li>
          <li><span class="x iconify" data-icon="lucide:minus"></span>Friction point two.</li>
          <li><span class="x iconify" data-icon="lucide:minus"></span>Friction point three.</li>
        </ul>
      </div>
      <div class="col after">
        <span class="tag"><span class="iconify" data-icon="lucide:check-circle"></span>After</span>
        <h2>The better path</h2>
        <ul>
          <li><span class="x iconify" data-icon="lucide:check"></span>Win one.</li>
          <li><span class="x iconify" data-icon="lucide:check"></span>Win two.</li>
          <li><span class="x iconify" data-icon="lucide:check"></span>Win three.</li>
        </ul>
      </div>
    </div>
    <div class="foot"><span>The Artificium</span><span><b>@edwinluther-t</b></span></div>
  </div>
</body>
</html>
