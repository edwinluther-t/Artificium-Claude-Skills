<!DOCTYPE html>
<!--
  ARCHETYPE: graded-compare
  WHEN TO USE: a before/after where each side is a VISUAL ARTIFACT (a document,
  screen, design, profile) that gets a NUMERIC SCORE. The message is "weak artifact
  (low score) -> upgraded artifact (high score), so take this action". Defining
  features vs neighbours: two ARTIFACT/IMAGE cards each capped by a colored
  BEFORE/AFTER pill and each scored by a circular CSS gauge, plus a CTA pill.
  DIFFERS FROM before-after / think-vs-reality: those compare TEXT bullet lists;
  this compares IMAGE/ARTIFACT slots graded by a meter. DIFFERS FROM chart-compare:
  that compares two DATA charts; here the charts are score GAUGES under real artifacts.
  DATA-* KNOBS (on <body>):
    data-gauge  on|off   show/hide the two score rings           (default on)
    data-cta    on|off   show/hide the bottom CTA pill           (default on)
    data-art    css|image each panel: CSS doc fallback or image  (default css)
  DEFAULT THEME: light mint, green accent, red(before)/green(after) gauges.
  RENDER: chrome --headless=new --force-device-scale-factor=2 --window-size=1080,1350 ...
-->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<style>
  :root{
    /* ---- palette (sampled from a light-mint graded before/after promo) ---- */
    --bg:#eef6ee; --bg2:#e2f0e4; --panel:#ffffff; --line:#d6e4d8;
    --ink:#1d2a22; --muted:#5d6b62; --accent:#3aa85a;
    --bad:#e8503a; --good:#3aa85a;
    --badsoft:#fdecea; --goodsoft:#e9f7ec;
    --gaugeWidth:18px;
    --w:1080px; --h:1350px;
  }
  *{margin:0;box-sizing:border-box}
  html,body{width:var(--w);height:var(--h)}
  body{background:radial-gradient(120% 90% at 50% 0%,var(--bg) 0%,var(--bg2) 100%);
    color:var(--ink);font-family:"Inter",sans-serif;overflow:hidden;
    background-image:radial-gradient(circle at 1px 1px,#1d2a2208 1px,transparent 0);
    background-size:30px 30px;}
  .wrap{height:100%;display:flex;flex-direction:column;padding:64px 70px 60px}

  /* header */
  .brand{display:flex;align-items:center;gap:14px;margin-bottom:34px}
  .brand .mk{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;
    background:var(--accent);color:#fff;font-size:26px}
  .brand .nm{font-family:"Poppins",sans-serif;font-weight:800;font-size:26px;letter-spacing:.04em}
  h1{font-family:"Poppins",sans-serif;font-weight:800;font-size:54px;line-height:1.08;
    letter-spacing:-.01em;text-align:center;max-width:20ch;margin:0 auto}
  h1 .hl{color:var(--accent)}

  /* compare region */
  .cols{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:48px;margin:42px 0 0;align-items:start}
  .col{display:flex;flex-direction:column;align-items:center}
  .pill{font-family:"Poppins",sans-serif;font-weight:700;font-size:24px;letter-spacing:.04em;
    color:#fff;padding:10px 30px;border-radius:12px;text-transform:uppercase;margin-bottom:20px;
    box-shadow:0 10px 24px #0002}
  .before .pill{background:var(--bad)} .after .pill{background:var(--good)}

  /* artifact card */
  .card{width:100%;aspect-ratio:3/4;background:var(--panel);border:1px solid var(--line);
    border-radius:18px;box-shadow:0 24px 50px #1d2a221a;overflow:hidden;position:relative;
    padding:32px 30px;display:flex;flex-direction:column}
  .after .card{box-shadow:0 24px 60px #3aa85a26;border-color:#bfe3c6}
  /* CSS document fallback (data-art="css") */
  .doc{flex:1;display:flex;flex-direction:column;gap:13px}
  .doc .h{height:18px;border-radius:5px;background:var(--ink);width:55%}
  .doc .sh{height:11px;border-radius:5px;background:var(--muted);opacity:.5;width:38%}
  .doc .ln{height:8px;border-radius:4px;background:#cdd8d0}
  .doc .ln.s{width:92%}.doc .ln.m{width:78%}.doc .ln.q{width:60%}
  .doc .sec{height:10px;border-radius:4px;width:30%;margin-top:10px}
  .before .doc .sec{background:#c9d4cc}
  .after  .doc{display:none}
  /* after = richer, two-column doc to read as "upgraded" */
  .after .doc2{flex:1;display:grid;grid-template-columns:1.5fr 1fr;gap:12px 16px;align-content:space-between}
  .after .doc2 .full{grid-column:1/-1}
  .before .doc2{display:none}
  .doc2 .h{height:16px;border-radius:5px;background:var(--ink);width:60%}
  .doc2 .sh{height:9px;border-radius:5px;background:var(--accent);width:42%;opacity:.85}
  .doc2 .ln{height:7px;border-radius:4px;background:#cdd8d0}
  .doc2 .ln.s{width:96%}.doc2 .ln.m{width:80%}.doc2 .ln.q{width:64%}
  .doc2 .sec{height:9px;border-radius:4px;width:48%;background:var(--accent);opacity:.7;margin-top:6px}
  .doc2 .bar{height:7px;border-radius:4px;background:var(--good);opacity:.55}
  /* image slot (data-art="image") */
  .card .art{position:absolute;inset:0;background-size:cover;background-position:top center;display:none}
  body[data-art="image"] .doc,body[data-art="image"] .doc2{display:none}
  body[data-art="image"] .card .art{display:block}
  .before .art{background-image:linear-gradient(135deg,#f3f6f3,#e7ece8)}   /* swap with real screenshot */
  .after  .art{background-image:linear-gradient(135deg,#eef9f0,#dcefe0)}

  /* score gauge */
  .gauge{margin-top:30px;display:flex;flex-direction:column;align-items:center;gap:14px}
  .ring{width:150px;height:150px;border-radius:50%;display:grid;place-items:center;position:relative;
    background:conic-gradient(var(--g) calc(var(--p)*1%),#e3ebe4 0);}
  .ring::before{content:"";position:absolute;inset:var(--gaugeWidth);border-radius:50%;
    background:var(--panel);box-shadow:inset 0 1px 4px #0001}
  .ring .v{position:relative;text-align:center;line-height:1}
  .ring .num{font-family:"Poppins",sans-serif;font-weight:800;font-size:46px}
  .ring .lab{font-size:16px;font-weight:600;color:var(--muted);margin-top:4px}
  .before .ring{--g:var(--bad);--p:45} .before .num{color:var(--ink)}
  .after  .ring{--g:var(--good);--p:90} .after .num{color:var(--ink)}
  .strength{font-family:"Poppins",sans-serif;font-weight:700;font-size:18px;letter-spacing:.08em;
    text-transform:uppercase;padding:11px 26px;border-radius:999px;border:2px dashed}
  .before .strength{color:var(--bad);border-color:#f3b3a8;background:var(--badsoft)}
  .after  .strength{color:var(--good);border-color:#a9ddb6;background:var(--goodsoft)}
  body[data-gauge="off"] .gauge{display:none}

  /* connector arrow between panels */
  .mid{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:2;
    width:74px;height:74px;border-radius:50%;background:var(--panel);display:grid;place-items:center;
    box-shadow:0 12px 30px #1d2a2226;border:1px solid var(--line)}
  .mid .iconify{font-size:34px;color:var(--accent)}
  .comparezone{position:relative}

  /* CTA */
  .cta{margin-top:34px;align-self:center;background:#16221b;color:#fff;font-family:"Poppins",sans-serif;
    font-weight:700;font-size:30px;padding:24px 56px;border-radius:18px;box-shadow:0 16px 36px #16221b44;
    display:inline-flex;align-items:center;gap:14px}
  body[data-cta="off"] .cta{display:none}

  .foot{display:flex;justify-content:space-between;align-items:center;color:var(--muted);
    font-size:17px;margin-top:26px}
  .foot b{color:var(--ink)}
</style>
</head>
<body data-gauge="on" data-cta="on" data-art="css">
  <div class="wrap">
    <div class="brand">
      <span class="mk"><span class="iconify" data-icon="lucide:navigation"></span></span>
      <span class="nm">BRAND</span>
    </div>

    <h1>One short headline and<br><span class="hl">a benefit-led second line</span></h1>

    <div class="comparezone">
      <div class="cols">
        <!-- BEFORE -->
        <div class="col before">
          <span class="pill">Before</span>
          <div class="card">
            <div class="doc">
              <div class="h"></div><div class="sh"></div>
              <div class="sec"></div>
              <div class="ln s"></div><div class="ln m"></div><div class="ln s"></div><div class="ln q"></div>
              <div class="sec"></div>
              <div class="ln m"></div><div class="ln s"></div><div class="ln m"></div><div class="ln q"></div>
              <div class="sec"></div>
              <div class="ln s"></div><div class="ln m"></div><div class="ln q"></div>
              <div class="sec"></div>
              <div class="ln m"></div><div class="ln s"></div><div class="ln q"></div>
            </div>
            <div class="art"></div>
          </div>
          <div class="gauge">
            <div class="ring"><div class="v"><div class="num">45</div><div class="lab">Low</div></div></div>
            <div class="strength">Metric Label</div>
          </div>
        </div>

        <!-- AFTER -->
        <div class="col after">
          <span class="pill">After</span>
          <div class="card">
            <div class="doc2">
              <div class="full h"></div>
              <div class="sh"></div><div class="sh"></div>
              <div class="sec"></div><div class="sec"></div>
              <div class="ln s"></div><div class="bar"></div>
              <div class="ln m"></div><div class="bar"></div>
              <div class="ln q"></div><div class="bar"></div>
              <div class="sec"></div><div class="sec"></div>
              <div class="ln s"></div><div class="bar"></div>
              <div class="ln m"></div><div class="bar"></div>
              <div class="ln s"></div><div class="bar"></div>
              <div class="ln q"></div><div class="bar"></div>
              <div class="sec"></div><div class="sec"></div>
              <div class="ln m"></div><div class="bar"></div>
              <div class="ln s"></div><div class="bar"></div>
              <div class="ln q"></div><div class="bar"></div>
            </div>
            <div class="art"></div>
          </div>
          <div class="gauge">
            <div class="ring"><div class="v"><div class="num">90</div><div class="lab">High</div></div></div>
            <div class="strength">Metric Label</div>
          </div>
        </div>
      </div>
      <div class="mid"><span class="iconify" data-icon="lucide:arrow-right"></span></div>
    </div>

    <div class="cta"><span class="iconify" data-icon="lucide:sparkles"></span>Upgrade to the better version</div>

    <div class="foot"><span>The Artificium</span><span><b>@edwinluther-t</b></span></div>
  </div>
</body>
</html>
